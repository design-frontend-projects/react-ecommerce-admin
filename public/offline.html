<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — Bluewave POS</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial,
          sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        text-align: center;
      }
      .icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 20px;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(148, 163, 184, 0.12);
        font-size: 32px;
      }
      h1 {
        font-size: 22px;
        margin: 0 0 12px;
      }
      p {
        margin: 0 0 24px;
        line-height: 1.6;
        color: #94a3b8;
      }
      button {
        appearance: none;
        border: 0;
        border-radius: 10px;
        padding: 12px 24px;
        font-size: 15px;
        font-weight: 600;
        color: #0f172a;
        background: #38bdf8;
        cursor: pointer;
      }
      button:hover {
        background: #7dd3fc;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon" aria-hidden="true">⚡</div>
      <h1>You're offline</h1>
      <p>
        Bluewave POS couldn't reach the network and this page isn't cached yet.
        Sales you make while offline are saved on this device and sync
        automatically when the connection returns.
      </p>
      <button type="button" onclick="location.reload()">Try again</button>
    </div>
    <script>
      // Auto-recover as soon as connectivity comes back.
      window.addEventListener('online', function () {
        location.reload()
      })
    </script>
  </body>
</html>
