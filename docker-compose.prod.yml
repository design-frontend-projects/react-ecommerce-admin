name: ecommerce-restaurant-prod
services:
  app:
    build:
      context: .
      target: runner
    restart: always
    deploy:
      replicas: 1
    networks:
      - app-network

  lb:
    image: nginx:alpine
    restart: always
    ports:
      - "4000:80"
    volumes:
      - ./nginx/lb.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
